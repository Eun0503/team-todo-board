name: CI/CD Pipeline (Self-Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🔬 CI Test 1 (Build & Lint Check)
        run: docker-compose build

      - name: 🤖 CI Test 2 (Start E2E Test Environment)
        run: docker-compose -f docker-compose.test.yml up --build -d backend-test frontend-test

      - name: 🤖 CI Test 3 (Run Playwright E2E Tests)
        run: docker-compose -f docker-compose.test.yml run --rm playwright

      - name: 🧹 Clean up Test Environment
        if: always()
        run: docker-compose -f docker-compose.test.yml down -v

      - name: 🚀 CD Deploy (Safe Deployment)
        run: |
          docker-compose down
          docker-compose up -d
