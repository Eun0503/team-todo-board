name: CI/CD Pipeline (Self-Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🔬 CI Test (Build & Lint Check)
        run: docker-compose build

      - name: 🚀 CD Deploy (Safe Deployment)
        run: |
          docker-compose down
          docker-compose up -d
