name: CI/CD Pipeline (Self-Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🔬 CI Test 1 (Build & Lint Check)
        if: "!contains(github.event.head_commit.message, '[skip test]')"
        run: docker-compose build

      - name: 🤖 CI Test 2 (Start E2E Test Environment)
        if: "!contains(github.event.head_commit.message, '[skip test]')"
        run: docker-compose -f docker-compose.test.yml up --build -d backend-test frontend-test

      - name: 🤖 CI Test 3 (Run Playwright E2E Tests)
        if: "!contains(github.event.head_commit.message, '[skip test]')"
        run: docker-compose -f docker-compose.test.yml run --rm playwright

      - name: 🧹 Clean up Test Environment
        if: "always() && !contains(github.event.head_commit.message, '[skip test]')"
        run: docker-compose -f docker-compose.test.yml down -v

      - name: 🚀 Build K8s Images
        run: |
          docker build -t eun0503/team-todo-board-backend:for-k8s ./backend
          docker build -t eun0503/team-todo-board-frontend:for-k8s ./frontend
          docker push eun0503/team-todo-board-backend:for-k8s
          docker push eun0503/team-todo-board-frontend:for-k8s
          
      - name: 🔄 Trigger K8s Rolling Update
        continue-on-error: true
        run: |
          kubectl rollout restart deployment backend frontend
