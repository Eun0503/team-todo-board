version: '3.8'

services:
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend-test
    ports:
      - "8001:8000"
    volumes:
      - test_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/test.db
      - TZ=Asia/Seoul

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend-test
    ports:
      - "3001:3000"
    depends_on:
      - backend-test
    environment:
      - BACKEND_URL=http://backend-test:8000
      - NEXT_PUBLIC_API_URL=http://backend-test:8000
      - TZ=Asia/Seoul

  playwright:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    container_name: playwright-test
    depends_on:
      - frontend-test
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && sleep 15 && npm run test:e2e"

volumes:
  test_data:
