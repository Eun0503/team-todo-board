apiVersion: v1
kind: PersistentVolume
metadata:
  name: backend-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: backend-local-hostpath
  hostPath:
    path: /run/desktop/mnt/host/c/k8s-data/team-todo-board
    type: DirectoryOrCreate
